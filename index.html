<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site com Foto</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(45deg, #0a0014, #1a0033, #2b0057, #000000);
  background-size: 300% 300%;
  animation: fundoAnimado 10s infinite alternate;
  color: white;
}

/* fundo animado */
@keyframes fundoAnimado {
  0% { background-position: left; }
  100% { background-position: right; }
}

/* efeito partículas */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: mover 18s linear infinite;
}

@keyframes mover {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* telas */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 0.8s ease;
  text-align: center;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* texto */
h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
}

/* botão */
button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, purple, black);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* imagem */
.image-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
}

.image-container img {
  width: 75%;
  max-width: 900px;
  border-radius: 15px;
  box-shadow: 0 0 40px purple;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1" class="screen">
  <h1>Feliz aniversário, 19tou !! 🎉</h1>
  <button onclick="entrar()">Surpresa</button>
</div>

<!-- TELA 2 -->
<div id="tela2" class="screen hidden">
  <div class="image-container">
    <img src="a884e768-c1fc-4561-bd9a-750cd8b0028c.png" alt="Foto especial">
  </div>
</div>

<script>
function entrar() {
  document.getElementById("tela1").classList.add("hidden");
  document.getElementById("tela2").classList.remove("hidden");
}
</script>

</body>
</html>
